<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Préstamos - LabTrack</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Dashboard Layout -->
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">
                        <i class="fas fa-flask"></i>
                    </div>
                    <span>LabTrack</span>
                </div>
            </div>
            
            <div class="sidebar-user">
                <div class="user-avatar">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div class="user-info">
                    <h4>Juan Angel H.</h4>
                    <p>22224029</p>
                </div>
            </div>

            <nav class="sidebar-menu">
                <a href="catalogo.html" class="menu-item">
                    <i class="fas fa-store menu-item-icon"></i>
                    <span class="menu-item-text">Catálogo</span>
                </a>
                <a href="mis-prestamos.html" class="menu-item active">
                    <i class="fas fa-hand-holding menu-item-icon"></i>
                    <span class="menu-item-text">Mis Préstamos</span>
                </a>
                <a href="configuracion-estudiante.html" class="menu-item">
                    <i class="fas fa-cog menu-item-icon"></i>
                    <span class="menu-item-text">Mi Perfil</span>
                </a>
                <a href="login.html" class="menu-item" style="margin-top: 50px; color: var(--danger);">
                    <i class="fas fa-sign-out-alt menu-item-icon"></i>
                    <span class="menu-item-text">Cerrar Sesión</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1 class="page-title">Mis Préstamos</h1>
                    <p class="page-subtitle">Historial de tus préstamos de equipos</p>
                </div>
                <a href="catalogo.html" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Nuevo Préstamo
                </a>
            </div>

            <!-- Filtros -->
            <div class="loan-filters">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-status="all">Todos</button>
                    <button class="filter-tab" data-status="activo">Activos</button>
                    <button class="filter-tab" data-status="completado">Completados</button>
                    <button class="filter-tab" data-status="retrasado">Retrasados</button>
                </div>
            </div>

            <!-- Mis Préstamos List -->
            <div class="mis-prestamos-list">
                <!-- Los préstamos se cargan dinámicamente desde JavaScript -->
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Inicializar filtros
        document.addEventListener('DOMContentLoaded', function() {
            const filterTabs = document.querySelectorAll('.filter-tab');
            filterTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    filterTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    filterMisPrestamos(tab.dataset.status);
                });
            });
        });

        function filterMisPrestamos(status) {
            const cards = document.querySelectorAll('.maintenance-card');
            
            cards.forEach(card => {
                const badge = card.querySelector('.badge');
                const rowStatus = badge.textContent.toLowerCase();
                
                if (status === 'all' || rowStatus === status) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
