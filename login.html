<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - LabTrack</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Page Wrapper -->
    <div class="auth-page">
        <div class="auth-container">
            <!-- Visual Side -->
            <div class="auth-visual">
                <div class="auth-visual-icon">
                    <i class="fas fa-sign-in-alt"></i>
                </div>
                <h2>Bienvenido de Nuevo</h2>
                <p>Accede a tu cuenta para gestionar los préstamos de equipos de laboratorio.</p>
                <a href="index.html" class="btn" style="background: rgba(255,255,255,0.2); color: white; border: 2px solid white; margin-top: 20px;">
                    <i class="fas fa-arrow-left"></i> Volver al Inicio
                </a>
            </div>

            <!-- Form Side -->
            <div class="auth-form-container">
                <h1>Iniciar Sesión</h1>
                <p>Selecciona tu tipo de usuario e ingresa tus credenciales</p>

                <!-- Tabs de selección -->
                <div class="tabs-container">
                    <button class="tab-btn active" data-type="estudiante">
                        <i class="fas fa-user-graduate"></i> Alumno
                    </button>
                    <button class="tab-btn" data-type="admin">
                        <i class="fas fa-user-cog"></i> Administrador
                    </button>
                </div>

                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="correo">Correo Institucional</label>
                        <div style="position: relative;">
                            <i class="fas fa-envelope form-input-icon"></i>
                            <input type="email" class="form-input" id="correo" name="correo" placeholder="tu.correo@itsr.edu.mx" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Contraseña</label>
                        <div style="position: relative;">
                            <i class="fas fa-lock form-input-icon"></i>
                            <input type="password" class="form-input" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                            <i class="fas fa-eye toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #757575;"></i>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt"></i> Ingresar
                    </button>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a href="registro.html">Regístrate Aquí</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
