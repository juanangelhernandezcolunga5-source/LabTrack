<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - LabTrack</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Page Wrapper -->
    <div class="auth-page">
        <div class="auth-container">
            <!-- Visual Side -->
            <div class="auth-visual">
                <div class="auth-visual-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h2>Únete a LabTrack</h2>
                <p>Crea tu cuenta para acceder al sistema de préstamos de equipos de laboratorio.</p>
                <a href="index.html" class="btn" style="background: rgba(255,255,255,0.2); color: white; border: 2px solid white; margin-top: 20px;">
                    <i class="fas fa-arrow-left"></i> Volver al Inicio
                </a>
            </div>

            <!-- Form Side -->
            <div class="auth-form-container">
                <h1>Crear Cuenta</h1>
                <p>Completa el formulario para registrarte en el sistema</p>

                <form class="auth-form" id="registroForm">
                    <div class="form-group">
                        <label class="form-label" for="nombre">Nombre Completo</label>
                        <div style="position: relative;">
                            <i class="fas fa-user form-input-icon"></i>
                            <input type="text" class="form-input" id="nombre" name="nombre" placeholder="Ingresa tu nombre completo" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="matricula">Matrícula</label>
                        <div style="position: relative;">
                            <i class="fas fa-id-card form-input-icon"></i>
                            <input type="text" class="form-input" id="matricula" name="matricula" placeholder="Ej. 22224029" maxlength="8" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="correo">Correo Institucional</label>
                        <div style="position: relative;">
                            <i class="fas fa-envelope form-input-icon"></i>
                            <input type="email" class="form-input" id="correo" name="correo" placeholder="tu.correo@itsr.edu.mx" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Contraseña</label>
                        <div style="position: relative;">
                            <i class="fas fa-lock form-input-icon"></i>
                            <input type="password" class="form-input" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                            <i class="fas fa-eye toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #757575;"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">Confirmar Contraseña</label>
                        <div style="position: relative;">
                            <i class="fas fa-lock form-input-icon"></i>
                            <input type="password" class="form-input" id="confirmPassword" name="confirmPassword" placeholder="Confirma tu contraseña" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-container">
                            <input type="checkbox" id="terminos" name="terminos" required>
                            <span>Acepto los <a href="#" style="color: var(--primary-green);">términos de cuidado de equipo</a> y las políticas de uso del sistema</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-orange btn-lg">
                        <i class="fas fa-user-plus"></i> Crear Cuenta
                    </button>
                </form>

                <div class="auth-footer">
                    <p>¿Ya tienes una cuenta? <a href="login.html">Iniciar Sesión</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Validación adicional para confirmar contraseña
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Las contraseñas no coinciden');
                return false;
            }
        });
    </script>
</body>
</html>
